<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avalanche Danger Rose</title>

<style>
body {
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    margin: 0;
}

/* ===== TOP PROBLEMS ===== */
.top-problems {
    background: white;
    width: 90%;
    max-width: 1000px;
    margin-top: 20px;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.problem-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
}

.problem-row label {
    font-weight: bold;
    width: 40px;
}

.problem-row input {
    flex: 1;
    padding: 6px;
    font-size: 14px;
}

/* ===== MAIN LAYOUT ===== */
.container {
    display: flex;
    align-items: flex-start;
    gap: 40px;
    margin: 20px;
}

/* ===== ROSE ===== */
svg {
    width: 600px;
    height: 600px;
}

.cell {
    fill: white;
    stroke: black;
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.15s ease;
}

/* ===== LEGEND ===== */
.legend {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 600px;
}

.legend-inner {
    display: flex;
    align-items: stretch; /* ensures equal height */
    gap: 40px;
}

/* ===== TABLE ===== */
.tg {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    font-size: 13px;
}

.tg th, .tg td {
    border: 1px solid #333;
    padding: 6px;
    text-align: left;
    vertical-align: top;
}

.tg th {
    background: #eee;
    font-weight: bold;
}

td[contenteditable="true"] {
    background: #fafafa;
}

td[contenteditable="true"]:focus {
    outline: 2px solid #4a90e2;
    background: white;
}

.color-box {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 6px;
    border: 1px solid #333;
}

/* ===== ELEVATION SCALE ===== */
.elevation-scale {
    position: relative;
    width: 200px;
}

.track {
    position: absolute;
    left: 25px;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #ccc;
    border-radius: 2px;
}

.dot {
    position: absolute;
    left: 18px;
    width: 14px;
    height: 14px;
    background: white;
    border: 2px solid #444;
    border-radius: 50%;
    cursor: grab;
    transform: translateY(-50%);
}

.dot span {
    position: absolute;
    left: 25px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    white-space: nowrap;
}

.reset-btn {
    margin-top: 15px;
    padding: 8px 12px;
    font-size: 14px;
    background: #444;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
}

.reset-btn:hover {
    background: #222;
}
</style>
</head>

<body>

<div class="top-problems">
    <h2>Top 3 Avalanche Problems</h2>
    <div class="problem-row"><label>#1</label><input type="text"></div>
    <div class="problem-row"><label>#2</label><input type="text"></div>
    <div class="problem-row"><label>#3</label><input type="text"></div>
</div>

<div class="container">

<!-- ROSE -->
<svg viewBox="0 0 600 600" id="chart"></svg>

<!-- LEGEND -->
<div class="legend">
    <h3>Danger Scale</h3>

    <div class="legend-inner">

        <!-- TABLE -->
        <table class="tg">
            <thead>
                <tr>
                    <th>Hazard Level</th>
                    <th>Likelihood</th>
                    <th>Size & Distribution</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="color-box" style="background:#2b2b2b;"></span> Extreme (5)</td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                </tr>
                <tr>
                    <td><span class="color-box" style="background:red;"></span> High (4)</td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                </tr>
                <tr>
                    <td><span class="color-box" style="background:orange;"></span> Considerable (3)</td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                </tr>
                <tr>
                    <td><span class="color-box" style="background:yellow;"></span> Moderate (2)</td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                </tr>
                <tr>
                    <td><span class="color-box" style="background:green;"></span> Low (1)</td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                </tr>
            </tbody>
        </table>

        <!-- ELEVATION SCALE -->
        <div class="elevation-scale" id="scale">
            <div class="track"></div>

            <div class="dot"><span>Above Resort</span></div>
            <div class="dot"><span>Upper Mountain</span></div>
            <div class="dot"><span>Lower Mountain</span></div>
        </div>

    </div>

    <button class="reset-btn" onclick="resetAll()">Reset All</button>
</div>

</div>

<script>
// ===== ROSE (unchanged) =====
const svg = document.getElementById("chart");
const centerX = 300, centerY = 300;
const outerRadius = 250, midRadius = outerRadius*2/3, innerRadius = outerRadius/3;
const segments = 8, angleStep = 360/segments;

const rotatedGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
rotatedGroup.setAttribute("transform", `rotate(-22 ${centerX} ${centerY})`);
svg.appendChild(rotatedGroup);

function polarToCartesian(cx, cy, r, angle) {
    const rad = (angle-90)*Math.PI/180;
    return {x: cx+r*Math.cos(rad), y: cy+r*Math.sin(rad)};
}

function createRingSegment(rInner,rOuter,startAngle,endAngle){
    const sO=polarToCartesian(centerX,centerY,rOuter,startAngle);
    const eO=polarToCartesian(centerX,centerY,rOuter,endAngle);
    const sI=polarToCartesian(centerX,centerY,rInner,endAngle);
    const eI=polarToCartesian(centerX,centerY,rInner,startAngle);
    const largeArcFlag=(endAngle-startAngle)>180?1:0;
    return `M ${sO.x} ${sO.y}
            A ${rOuter} ${rOuter} 0 ${largeArcFlag} 1 ${eO.x} ${eO.y}
            L ${sI.x} ${sI.y}
            A ${rInner} ${rInner} 0 ${largeArcFlag} 0 ${eI.x} ${eI.y}
            Z`;
}

function getColor(c){return["white","green","yellow","orange","red","#2b2b2b"][c];}

function addCell(rInner,rOuter,startAngle,endAngle){
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",createRingSegment(rInner,rOuter,startAngle,endAngle));
    path.setAttribute("class","cell");
    path.dataset.clicks=0;
    path.addEventListener("click",function(){
        let c=(+this.dataset.clicks+1)%6;
        this.dataset.clicks=c;
        this.style.fill=getColor(c);
    });
    rotatedGroup.appendChild(path);
}

function resetAll(){
    document.querySelectorAll(".cell").forEach(c=>{
        c.dataset.clicks=0;
        c.style.fill="white";
    });
}

for(let i=0;i<segments;i++){
    const s=i*angleStep, e=s+angleStep;
    addCell(midRadius,outerRadius,s,e);
    addCell(innerRadius,midRadius,s,e);
    addCell(0,innerRadius,s,e);
}

// ===== DRAGGABLE DOTS =====
const scale = document.getElementById("scale");
const dots = document.querySelectorAll(".dot");

dots.forEach((dot,index)=>{
    requestAnimationFrame(()=>{
        const height=scale.offsetHeight;
        dot.style.top=(height*(index+1)/4)+"px";
    });

    let dragging=false;

    dot.addEventListener("mousedown",()=>dragging=true);
    document.addEventListener("mouseup",()=>dragging=false);

    document.addEventListener("mousemove",(e)=>{
        if(!dragging) return;
        const rect=scale.getBoundingClientRect();
        let y=e.clientY-rect.top;
        y=Math.max(0,Math.min(rect.height,y));
        dot.style.top=y+"px";
    });
});
</script>

</body>
</html>
