<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avalanche Danger Rose</title>
<style>
    body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .container {
        display: flex;
        align-items: center;
        gap: 40px;
    }

    svg {
        width: 600px;
        height: 600px;
    }

    .cell {
        fill: white;
        stroke: black;
        stroke-width: 1.5;
        cursor: pointer;
        transition: fill 0.15s ease;
    }

    .label {
        font-size: 16px;
        text-anchor: middle;
        dominant-baseline: middle;
        font-weight: bold;
    }

    .legend {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        max-width: 240px;
    }

    .legend h3 {
        margin-top: 0;
        margin-bottom: 8px;
    }

    .legend p {
        font-size: 13px;
        margin-top: 0;
        margin-bottom: 15px;
        color: #444;
    }

    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .color-box {
        width: 20px;
        height: 20px;
        margin-right: 10px;
        border: 1px solid #333;
    }

    .reset-btn {
        margin-top: 15px;
        padding: 8px 12px;
        font-size: 14px;
        background: #444;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }

    .reset-btn:hover {
        background: #222;
    }
</style>
</head>
<body>

<div class="container">
    <svg viewBox="0 0 600 600" id="chart"></svg>

    <div class="legend">
        <h3>Danger Scale</h3>
        <p>Click in a cell to color it and mark the level of avalanche danger.</p>

        <div class="legend-item"><div class="color-box" style="background: green;"></div>Low (1)</div>
        <div class="legend-item"><div class="color-box" style="background: yellow;"></div>Moderate (2)</div>
        <div class="legend-item"><div class="color-box" style="background: orange;"></div>Considerable (3)</div>
        <div class="legend-item"><div class="color-box" style="background: red;"></div>High (4)</div>
        <div class="legend-item"><div class="color-box" style="background: #2b2b2b;"></div>Extreme (5)</div>

        <button class="reset-btn" onclick="resetAll()">Reset All</button>
    </div>
</div>

<script>
const svg = document.getElementById("chart");

const centerX = 300;
const centerY = 300;
const outerRadius = 250;
const midRadius = outerRadius * 2/3;
const innerRadius = outerRadius * 1/3;

const segments = 8;
const angleStep = 360 / segments;

// Rotate entire rose
const rotatedGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
rotatedGroup.setAttribute("transform", `rotate(-22 ${centerX} ${centerY})`);
svg.appendChild(rotatedGroup);

function polarToCartesian(cx, cy, r, angle) {
    const rad = (angle - 90) * Math.PI / 180.0;
    return {
        x: cx + r * Math.cos(rad),
        y: cy + r * Math.sin(rad)
    };
}

function createRingSegment(rInner, rOuter, startAngle, endAngle) {
    const startOuter = polarToCartesian(centerX, centerY, rOuter, startAngle);
    const endOuter = polarToCartesian(centerX, centerY, rOuter, endAngle);
    const startInner = polarToCartesian(centerX, centerY, rInner, endAngle);
    const endInner = polarToCartesian(centerX, centerY, rInner, startAngle);

    const largeArcFlag = (endAngle - startAngle) > 180 ? 1 : 0;

    return `
        M ${startOuter.x} ${startOuter.y}
        A ${rOuter} ${rOuter} 0 ${largeArcFlag} 1 ${endOuter.x} ${endOuter.y}
        L ${startInner.x} ${startInner.y}
        A ${rInner} ${rInner} 0 ${largeArcFlag} 0 ${endInner.x} ${endInner.y}
        Z
    `;
}

function getColor(clicks) {
    switch(clicks) {
        case 1: return "green";
        case 2: return "yellow";
        case 3: return "orange";
        case 4: return "red";
        case 5: return "#2b2b2b";
        default: return "white";
    }
}

function addCell(rInner, rOuter, startAngle, endAngle) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", createRingSegment(rInner, rOuter, startAngle, endAngle));
    path.setAttribute("class", "cell");
    path.dataset.clicks = 0;

    path.addEventListener("click", function() {
        let clicks = parseInt(this.dataset.clicks);
        clicks = (clicks + 1) % 6;
        this.dataset.clicks = clicks;
        this.style.fill = getColor(clicks);
    });

    rotatedGroup.appendChild(path);
}

function resetAll() {
    const cells = document.querySelectorAll(".cell");
    cells.forEach(cell => {
        cell.dataset.clicks = 0;
        cell.style.fill = "white";
    });
}

// Build rose
for (let i = 0; i < segments; i++) {
    const startAngle = i * angleStep;
    const endAngle = startAngle + angleStep;

    addCell(midRadius, outerRadius, startAngle, endAngle);
    addCell(innerRadius, midRadius, startAngle, endAngle);
    addCell(0, innerRadius, startAngle, endAngle);
}

const directions = ["N","NE","E","SE","S","SW","W","NW"];

// Radially aligned labels
for (let i = 0; i < segments; i++) {
    const angle = i * angleStep + angleStep / 2;
    const pos = polarToCartesian(centerX, centerY, outerRadius + 30, angle);

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", pos.x);
    text.setAttribute("y", pos.y);
    text.setAttribute("class", "label");
    text.textContent = directions[i];

    // Rotate label to follow arc
    let rotation = angle;
    if (rotation > 90 && rotation < 270) {
        rotation += 180; // keep text upright on bottom half
    }

    text.setAttribute("transform", `rotate(${rotation} ${pos.x} ${pos.y})`);

    rotatedGroup.appendChild(text);
}
</script>

</body>
</html>
